name: Daily Quote

on:
  schedule:
    # 00:30 UTC = 08:30 SGT (Singapore, UTC+8). GitHub cron is always UTC.
    - cron: '30 0 * * *'
  workflow_dispatch: {}   # lets you trigger it manually to test

permissions:
  contents: write   # needed so the workflow can commit the updated state.json

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install requests anthropic

      - run: python send_quote.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated state
        run: |
          git config user.name "daily-quote-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git commit -m "Update state (daily send)" || echo "No changes to commit"
          for i in 1 2 3 4 5; do
            git pull --rebase && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
