name: Poll Acknowledgment

on:
  schedule:
    # Every 15 minutes. Only does real work if a message is pending ack,
    # so most runs are a fast no-op.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python poll_ack.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Commit updated state
        run: |
          git config user.name "daily-quote-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git commit -m "Update state (poll)" || echo "No changes to commit"
          for i in 1 2 3 4 5; do
            git pull --rebase && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
